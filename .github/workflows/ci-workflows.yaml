name: CI - Aspect Workflows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Format
        run: aspect format --task-key=format
  buildifier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Buildifier
        run: aspect buildifier --task-key=buildifier
  test:
    name: test (${{ matrix.workspace.path }}, ${{ matrix.bazel.id }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - { path: ".", slug: "root" }
          - { path: "e2e/external_repository", slug: "e2e-external_repository" }
          - { path: "e2e/coverage", slug: "e2e-coverage" }
          - { path: "e2e/npm_packages", slug: "e2e-npm_packages" }
          - { path: "e2e/smoke", slug: "e2e-smoke" }
          - { path: "e2e/smoke_jest_29", slug: "e2e-smoke_jest_29" }
          - { path: "e2e/swc", slug: "e2e-swc" }
        bazel:
          - {
              id: "bazel-7",
              version: "7.x",
              flags: "--bazel-flag=--test_tag_filters=-skip-on-bazel7",
            }
          - {
              id: "bazel-8",
              version: "8.x",
              flags: "--bazel-flag=--test_tag_filters=-skip-on-bazel8 --bazel-flag=--lockfile_mode=update",
            }
          - {
              id: "bazel-9",
              version: "9.x",
              flags: "--bazel-flag=--test_tag_filters=-skip-on-bazel9 --bazel-flag=--lockfile_mode=update",
            }
    env:
      USE_BAZEL_VERSION: ${{ matrix.bazel.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Test
        working-directory: ${{ matrix.workspace.path }}
        run: aspect test --task-key=test-${{ matrix.workspace.slug }}-${{ matrix.bazel.id }} ${{ matrix.bazel.flags }} -- //...

      # Workspaces with a test.sh run additional integration checks that plain
      # `bazel test //...` can't express (coverage assertions, snapshot updating,
      # external-repo tests). The root test.sh drives the e2e/*.sh scripts.
      - name: Optional ./test.sh
        working-directory: ${{ matrix.workspace.path }}
        run: |
          if [[ -f ./test.sh ]]; then
            ./test.sh
          else
            echo "No test.sh in ${PWD}; skipping"
          fi

  # For branch protection settings, this job provides a "stable" name that can be used to gate PR merges
  # on "all matrix jobs were successful".
  conclusion:
    needs: [format, buildifier, test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          if [[ "${{ needs.format.result }}" == "success" \
             && "${{ needs.buildifier.result }}" == "success" \
             && "${{ needs.test.result }}" == "success" ]]; then
            exit 0
          else
            exit 1
          fi
